<DOCTYPE !html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="title-container">
            <h1 class="title-txt">Metric/Imperial Unit Conversion</h1>
            <input type="text" class="input-fld" id="input-el"/>
            <button class="btn-txt" id="btn-el">Convert</button>
        </div>
        <div class="response-container">
            <p class="response-txt">Length (Meter/Feet)<span class="sub-txt" id="length-el"></span></p>
            <p class="response-txt" id="volume-txt">Volume (Liters/Gallons)<span class="sub-txt" id="volume-el"></span></p>
            <p class="response-txt" id="mass-txt">Mass (Kilograms/Pounds)<span class="sub-txt" id="mass-el"></span></p>
        </div>
        <script src="index.js"></script>
    </body>
</html>
